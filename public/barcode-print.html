<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>طباعة الباركود — الرفاعي للإضاءة</title>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #f4f4f4;
      color: #1a1a1a;
      direction: rtl;
    }

    /* ===================== SCREEN UI ===================== */
    .screen-ui {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e0e0e0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #c9a227, #e8c547);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #1a1a1a;
    }

    .brand-name {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 0.01em;
    }

    .brand-sub {
      font-size: 11px;
      color: #777;
      margin-top: 2px;
      letter-spacing: 0.05em;
    }

    .print-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      background: #c9a227;
      color: #1a1a1a;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.2s;
    }

    .print-btn:hover { background: #e8c547; }

    .print-btn svg {
      width: 16px;
      height: 16px;
    }

    /* ===================== CONTROLS ===================== */
    .controls {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .ctrl-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .ctrl-group label {
      font-size: 11px;
      color: #777;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .ctrl-group input[type="number"],
    .ctrl-group select {
      padding: 7px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafafa;
      width: 120px;
      outline: none;
    }

    .ctrl-group input:focus,
    .ctrl-group select:focus {
      border-color: #c9a227;
      background: #fffdf5;
    }

    /* ===================== LABEL GRID ===================== */
    .label-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--label-gap, 6px);
      justify-content: flex-start;
    }

    /* ===================== SINGLE LABEL ===================== */
    .barcode-label {
      background: #fff;
      border: 1px solid #d0d0d0;
      border-radius: 6px;
      padding: 10px 12px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      width: var(--label-width, 160px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      position: relative;
      overflow: hidden;
    }

    .barcode-label::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #c9a227, #e8c547);
    }

    .label-product-name {
      font-size: 11px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 3px;
    }

    .label-product-en {
      font-size: 9px;
      color: #888;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .label-barcode-svg {
      width: 100%;
    }

    .label-barcode-num {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      color: #555;
      letter-spacing: 0.08em;
    }

    .label-price {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 1px;
    }

    .label-price-value {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      font-weight: 700;
      color: #c9a227;
    }

    .label-price-unit {
      font-size: 9px;
      color: #777;
    }

    .label-sku {
      font-family: 'Courier New', monospace;
      font-size: 8px;
      color: #aaa;
      background: #f5f5f5;
      border-radius: 3px;
      padding: 1px 5px;
    }

    .label-divider {
      width: 100%;
      height: 1px;
      background: #f0f0f0;
      margin: 2px 0;
    }

    /* ===================== LOADING / ERROR ===================== */
    .status-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 60px 24px;
      text-align: center;
      color: #777;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #c9a227;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    /* ===================== PRINT STYLES ===================== */
    @media print {
      @page {
        margin: 8mm;
        size: A4;
      }

      body { background: #fff; }

      .screen-ui { padding: 0; margin: 0; max-width: 100%; }
      .top-bar { display: none; }
      .controls { display: none; }

      .label-grid {
        gap: var(--label-gap, 4mm) !important;
      }

      .barcode-label {
        border: 0.5pt solid #ccc;
        box-shadow: none;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      .barcode-label::before {
        height: 2px;
      }
    }
  </style>
</head>
<body>

<div class="screen-ui">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="brand">
      <div class="brand-logo">ر</div>
      <div>
        <div class="brand-name">الرفاعي للإضاءة والنجف</div>
        <div class="brand-sub">طباعة ملصقات الباركود</div>
      </div>
    </div>
    <button class="print-btn" onclick="window.print()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/>
        <rect x="6" y="14" width="12" height="8"/>
      </svg>
      طباعة الآن
    </button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="ctrl-group">
      <label>عدد النسخ لكل منتج</label>
      <input type="number" id="copies" value="1" min="1" max="50" onchange="renderLabels()" />
    </div>
    <div class="ctrl-group">
      <label>حجم الملصق</label>
      <select id="labelSize" onchange="applyLabelSize()">
        <option value="120">صغير — 120×65mm</option>
        <option value="160" selected>متوسط — 160×80mm</option>
        <option value="200">كبير — 200×100mm</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>إظهار السعر</label>
      <select id="showPrice" onchange="renderLabels()">
        <option value="1">نعم</option>
        <option value="0">لا</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>نوع الباركود</label>
      <select id="barcodeFormat" onchange="renderLabels()">
        <option value="CODE128">CODE128 (موصى به)</option>
        <option value="EAN13">EAN-13</option>
        <option value="EAN8">EAN-8</option>
      </select>
    </div>
  </div>

  <!-- Labels Container -->
  <div id="container">
    <div class="status-card">
      <div class="spinner"></div>
      <div>جاري تحميل بيانات المنتجات...</div>
    </div>
  </div>

</div>

<script>
  // ===================== READ URL PARAMS =====================
  const params = new URLSearchParams(location.search);
  const token  = params.get('token');
  const idsRaw = params.get('ids');   // "1,2,3" — optional, if empty = print all
  const apiBase = params.get('api') || '';   // base URL of the API server

  if (!token) {
    document.getElementById('container').innerHTML = `
      <div class="status-card">
        <div class="error-icon">🔒</div>
        <div style="font-size:16px;font-weight:700;margin-bottom:8px;color:#c00">جلسة غير صالحة</div>
        <div style="font-size:13px">يرجى تسجيل الدخول ثم إعادة المحاولة</div>
      </div>`;
  }

  let loadedProducts = [];

  // ===================== FETCH PRODUCTS =====================
  async function loadProducts() {
    try {
      const url = idsRaw
        ? null
        : `${apiBase}/api/products`;

      let products = [];

      if (idsRaw) {
        // Load specific products
        const ids = idsRaw.split(',').map(s => s.trim()).filter(Boolean);
        const results = await Promise.all(
          ids.map(id =>
            fetch(`${apiBase}/api/products/${id}`, {
              headers: { Authorization: `Bearer ${token}` }
            }).then(r => r.ok ? r.json() : null)
          )
        );
        products = results
          .filter(Boolean)
          .map(r => r.product);
      } else {
        const res = await fetch(`${apiBase}/api/products`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        products = data.products || [];
      }

      loadedProducts = products.filter(p => p.barcode);
      renderLabels();
    } catch (err) {
      document.getElementById('container').innerHTML = `
        <div class="status-card">
          <div class="error-icon">⚠️</div>
          <div style="font-size:16px;font-weight:700;margin-bottom:8px;color:#c00">خطأ في تحميل البيانات</div>
          <div style="font-size:13px;color:#777">${err.message}</div>
        </div>`;
    }
  }

  // ===================== APPLY LABEL SIZE =====================
  function applyLabelSize() {
    const size = parseInt(document.getElementById('labelSize').value);
    document.documentElement.style.setProperty('--label-width', size + 'px');
    document.documentElement.style.setProperty('--label-gap', Math.round(size * 0.037) + 'px');
    renderLabels();
  }

  // ===================== RENDER LABELS =====================
  function renderLabels() {
    if (!loadedProducts.length) return;

    const copies     = Math.max(1, parseInt(document.getElementById('copies').value) || 1);
    const showPrice  = document.getElementById('showPrice').value === '1';
    const fmt        = document.getElementById('barcodeFormat').value;
    const container  = document.getElementById('container');

    // Build all labels
    const labels = [];
    for (const p of loadedProducts) {
      for (let i = 0; i < copies; i++) {
        labels.push(buildLabelHTML(p, showPrice, fmt));
      }
    }

    container.innerHTML = `<div class="label-grid">${labels.join('')}</div>`;

    // Render barcodes into SVGs
    loadedProducts.forEach((p, pi) => {
      for (let i = 0; i < copies; i++) {
        const idx = pi * copies + i;
        const svgEl = document.getElementById(`bc-${idx}`);
        if (!svgEl) continue;

        try {
          JsBarcode(svgEl, p.barcode, {
            format: fmt,
            width: 1.4,
            height: 40,
            displayValue: false,
            margin: 0,
            background: '#ffffff',
            lineColor: '#1a1a1a',
          });
        } catch (e) {
          // Fallback to CODE128 if selected format fails (e.g. EAN13 needs 12-digit)
          try {
            JsBarcode(svgEl, p.barcode, {
              format: 'CODE128',
              width: 1.4,
              height: 40,
              displayValue: false,
              margin: 0,
            });
          } catch (_) {
            svgEl.parentElement.innerHTML = `<div style="font-size:10px;color:#c00;padding:8px;">باركود غير صالح</div>`;
          }
        }
      }
    });
  }

  // ===================== BUILD SINGLE LABEL =====================
  function buildLabelHTML(p, showPrice, fmt) {
    const idx = loadedProducts.indexOf(p) * parseInt(document.getElementById('copies').value || 1);
    const actualIdx = idx + (document.querySelectorAll('.barcode-label').length);

    // We use a deterministic id per render pass
    const uid = `bc-${loadedProducts.indexOf(p) * 100 + Math.random() * 100 | 0}`;

    return `
      <div class="barcode-label">
        <div class="label-product-name">${escHtml(p.name)}</div>
        ${p.name_en ? `<div class="label-product-en">${escHtml(p.name_en)}</div>` : ''}
        <div class="label-divider"></div>
        <svg class="label-barcode-svg" id="${uid}"></svg>
        <div class="label-barcode-num">${escHtml(p.barcode)}</div>
        ${showPrice && p.sale_price ? `
          <div class="label-divider"></div>
          <div class="label-price">
            <span class="label-price-value">${Number(p.sale_price).toLocaleString('ar-EG')}</span>
            <span class="label-price-unit">ج.م</span>
          </div>` : ''}
        <div class="label-sku">${escHtml(p.sku)}</div>
      </div>`;
  }

  // Re-render uses proper sequential IDs
  function renderLabels() {
    if (!loadedProducts.length) return;

    const copies     = Math.max(1, parseInt(document.getElementById('copies').value) || 1);
    const showPrice  = document.getElementById('showPrice').value === '1';

    const container  = document.getElementById('container');

    const labels = [];
    let idx = 0;
    for (const p of loadedProducts) {
      for (let i = 0; i < copies; i++) {
        labels.push(singleLabel(p, idx, showPrice));
        idx++;
      }
    }

    container.innerHTML = `<div class="label-grid">${labels.join('')}</div>`;

    // Draw barcodes
    idx = 0;
    for (const p of loadedProducts) {
      for (let i = 0; i < copies; i++) {
        const svgEl = document.getElementById(`bc-${idx}`);
        if (svgEl && p.barcode) {
          try {
            JsBarcode(svgEl, String(p.barcode), {
              format: fmt,
              width: 1.5,
              height: 44,
              displayValue: false,
              margin: 0,
              background: '#ffffff',
              lineColor: '#111111',
            });
          } catch (_) {
            try {
              JsBarcode(svgEl, String(p.barcode), {
                format: 'CODE128',
                width: 1.5,
                height: 44,
                displayValue: false,
                margin: 0,
              });
            } catch (__) {
              svgEl.outerHTML = `<div style="font-size:9px;color:#c00;padding:6px 0">باركود غير صالح</div>`;
            }
          }
        }
        idx++;
      }
    }
  }

  function singleLabel(p, idx, showPrice) {
    return `
      <div class="barcode-label">
        <div class="label-product-name">${escHtml(p.name)}</div>
        ${p.name_en ? `<div class="label-product-en">${escHtml(p.name_en)}</div>` : ''}
        <div class="label-divider"></div>
        <svg class="label-barcode-svg" id="bc-${idx}"></svg>
        <div class="label-barcode-num">${escHtml(String(p.barcode))}</div>
        ${showPrice && p.sale_price ? `
          <div class="label-divider"></div>
          <div class="label-price">
            <span class="label-price-value">${Number(p.sale_price).toLocaleString('ar-EG')}</span>
            <span class="label-price-unit">ج.م</span>
          </div>` : ''}
        <div class="label-sku">${escHtml(p.sku || '')}</div>
      </div>`;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ===================== INIT =====================
  applyLabelSize();
  if (token) loadProducts();
</script>
</body>
</html>
